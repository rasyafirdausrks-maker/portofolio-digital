<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Aca</title>
    <!-- Menambahkan versi ?v=99 agar browser terpaksa memuat ulang -->
    <link rel="stylesheet" href="style.css?v=99">
</head>
<body>
    <header>
        <h1>Portfolio Aca</h1>
        <div id="clock">00:00:00</div>
        <button id="darkModeBtn">🌙 Dark Mode</button>
    </header>

    <main>
        <section id="auth">
            <h2>Login / Register</h2>
            <input type="text" id="usernameInput" placeholder="Username">
            <button id="registerBtn">Register</button>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn">Logout</button>
            <p id="loginStatus">Belum Login</p>
        </section>

        <section id="dashboard">
            <h2>Dashboard Profil</h2>
            <img id="profilePic" src="https://via.placeholder.com/150" alt="Profil">
            <input type="file" id="profileUpload" accept="image/*">
            <input type="text" id="nameInput" placeholder="Nama baru">
            <button id="saveNameBtn">Simpan Nama</button>
            <p id="profileName">Pengguna</p>
        </section>

        <section id="tools">
            <h2>Fitur Tambahan</h2>
            <label>Upload File:</label>
            <input type="file" id="fileUpload">
            <ul id="fileList"></ul>
            <label>Pilih Tanggal:</label>
            <input type="date" id="calendarDate">
            <p id="selectedDate">Belum memilih tanggal</p>
        </section>

        <section id="notes">
            <h2>Catatan Harian</h2>
            <input type="text" id="noteInput" placeholder="Tulis catatan...">
            <button id="addNoteBtn">Tambah</button>
            <ul id="noteList"></ul>
        </section>
    </main>

    <button id="backToTop" style="position:fixed; bottom:20px; right:20px;">↑ Atas</button>
    
    <script src="script.js?v=99"></script>
</body>
</html>
